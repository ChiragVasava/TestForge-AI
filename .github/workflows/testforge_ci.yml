name: TestForge AI CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test_and_scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Essential for git diff target branch comparison

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Run PyTest Suite & Generate Coverage
      run: |
        # Set PYTHONPATH to include backend so app can be imported
        export PYTHONPATH=$PYTHONPATH:backend
        pytest backend/app --cov=backend/app --cov-report=json:coverage.json --cov-report=term-missing

    - name: Execute TestForge Standalone Scanner
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python scripts/testforge_scanner.py --coverage coverage.json --diff origin/main --output testforge_report.md --publish

    - name: Upload Test Coverage Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: testforge-reports
        path: |
          coverage.json
          testforge_report.md
